name: Healthcare Knowledge Navigator CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Tests ─────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt

      - name: Create .env for tests
        working-directory: ./backend
        run: |
          cat > .env << EOF
          ANTHROPIC_API_KEY=test_key
          CHROMA_HOST=localhost
          CHROMA_PORT=8100
          JWT_SECRET_KEY=test-secret-key
          DATABASE_URL=sqlite:///./test.db
          EOF

      - name: Run tests
        working-directory: ./backend
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Lint with flake8
        working-directory: ./backend
        run: |
          pip install flake8
          flake8 app/ --max-line-length=120 --ignore=E501,W503

  # ─── Frontend Checks ───────────────────────────────────
  frontend-check:
    name: Frontend Type Check & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Type check
        working-directory: ./frontend
        run: npm run type-check

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

  # ─── Docker Build Test ────────────────────────────────
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-check]
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker compose build --no-cache

      - name: Verify images built
        run: |
          docker images | grep hkn || docker images | grep healthcare

  # ─── Deploy (Production only, main branch) ───────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/healthcare-navigator
            git pull origin main
            docker compose pull
            docker compose up -d --build
            docker compose ps
